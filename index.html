<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e3a5f" />

  <!-- Acelera el primer envío a Google (guardar / reporte) -->
  <link rel="preconnect" href="https://script.google.com" crossorigin />
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin />

  <!-- iOS / PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KLN Supervisión" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>KLN Supervisión</title>
</head>
<body>

  <!-- ============ ENCABEZADO ============ -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-logo">
        <img src="logo.jpg" alt="KLN" width="44" height="44" decoding="async" />
      </span>
      <div>
        <div class="brand-name">Supervisión</div>
        <div class="brand-sub">Inspección de limpieza</div>
      </div>
    </div>
    <div class="contract-pill" id="contractPill">Liverpool</div>
  </header>

  <main class="container">

    <!-- ============ FORMULARIO ============ -->
    <form id="form" autocomplete="off" novalidate>

      <!-- Supervisor (cada quien escribe su nombre) — va primero -->
      <section class="field">
        <label class="label" for="supervisor">Supervisor</label>
        <input
          type="text"
          id="supervisor"
          class="input"
          placeholder="Escribe tu nombre…"
          autocapitalize="words"
          autocomplete="name"
          required />
        <p class="hint">Se recuerda en este dispositivo para el resto del recorrido.</p>
      </section>

      <!-- Nivel -->
      <section class="field">
        <label class="label" for="nivel">Nivel</label>
        <select id="nivel" class="select" required>
          <option value="" disabled selected>Selecciona un nivel…</option>
        </select>
      </section>

      <!-- Área principal -->
      <section class="field">
        <label class="label" for="area">Área</label>
        <select id="area" class="select" required disabled>
          <option value="" disabled selected>Primero elige el nivel…</option>
        </select>
      </section>

      <!-- Sub-área (selector con búsqueda; se oculta si el área no tiene sub-áreas) -->
      <section class="field" id="subareaField" hidden>
        <label class="label" for="subareaSearch">Sub-área</label>
        <div class="combo" id="subareaCombo">
          <input
            type="text"
            id="subareaSearch"
            class="input combo-input"
            placeholder="Escribe para buscar…"
            inputmode="search"
            autocomplete="off"
            disabled />
          <input type="hidden" id="subarea" required />
          <ul class="combo-list" id="subareaList" hidden></ul>
        </div>
        <p class="hint" id="subareaHint">Primero elige el área.</p>
      </section>

      <!-- Calificación -->
      <section class="field">
        <span class="label">Calificación</span>
        <div class="rating" id="rating" role="radiogroup" aria-label="Calificación"></div>
      </section>

      <!-- Observación -->
      <section class="field">
        <label class="label" for="observacion">Observación <span class="muted">(opcional)</span></label>
        <textarea id="observacion" class="input textarea" rows="2"
          placeholder="Notas, detalles, pendientes…"></textarea>
      </section>

      <!-- Fotos -->
      <section class="field">
        <span class="label">Fotos <span class="muted" id="fotoCounter">(0)</span></span>
        <div class="photos" id="photoGrid"></div>
        <label class="btn btn-ghost photo-add" id="photoAddBtn">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M9 3l-1.8 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
          </svg>
          Tomar / subir foto
          <input type="file" id="photoInput" accept="image/*" capture="environment" multiple hidden />
        </label>
        <p class="hint" id="photoHint">Mínimo 1, máximo 3 fotos por área.</p>
      </section>

      <!-- Acciones -->
      <div class="actions">
        <button type="submit" class="btn btn-primary" id="saveBtn">
          Guardar y siguiente área
        </button>
        <button type="button" class="btn btn-secondary" id="finishBtn">
          Terminar y enviar reporte al jefe
        </button>
      </div>
    </form>

    <!-- Resumen del recorrido -->
    <section class="summary" id="summary" hidden>
      <h2 class="summary-title">Recorrido de hoy</h2>
      <div class="summary-stats" id="summaryStats"></div>
      <ul class="summary-list" id="summaryList"></ul>
    </section>

  </main>

  <!-- ============ TOAST ============ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ============ OVERLAY ============ -->
  <div class="overlay" id="overlay" hidden>
    <div class="spinner"></div>
    <p id="overlayText">Enviando…</p>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
